name: bytemail
description: Local-first Flutter email client for Windows and Android.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_bloc: ^9.1.1
  equatable: ^2.1.0
  shared_preferences: ^2.5.5
  path: ^1.9.1
  path_provider: ^2.1.6
  uuid: ^4.5.3
  collection: ^1.19.1
  http: ^1.6.0
  enough_mail: ^2.1.7
  flutter_secure_storage: ^10.3.1
  drift: ^2.34.2
  sqlite3: ^3.4.0
  sqlite3_flutter_libs: ^0.6.0+eol
  home_widget: ^0.9.3
  url_launcher: ^6.3.2
  webview_flutter: ^4.14.1
  webview_flutter_windows: ^1.0.0
  oauth2: ^2.0.3
  app_links: ^6.4.0
  crypto: ^3.0.6
  xml: ^6.5.0
  connectivity_plus: ^6.1.4
  window_manager: ^0.5.2
  tray_manager: ^0.5.3
  printing: ^5.14.3
  file_picker: 11.0.2
  desktop_multi_window: ^0.3.0
  pdf: 3.12.0
  flutter_widget_from_html: ^0.17.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.15.1
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - windows/runner/resources/app_icon.ico
    - assets/fonts/OpenSans-Regular.ttf
    - assets/fonts/OpenSans-Bold.ttf
